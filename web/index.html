<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Plataforma SaaS de monitoreo agrícola inteligente: estaciones 4G, sensores, alarmas y analítica de campo.">
<title>[Marca] — Monitoreo agrícola inteligente</title>
<style>
  :root{
    --bg:#0a0f1d;--bg2:#0e1426;--panel:#141d33;--panel2:#1a2440;--line:#283450;
    --txt:#eaf0fb;--muted:#9aa6c4;--brand:#52e3a4;--brand2:#3fa7ff;--accent:#a78bfa;
    --good:#34d399;--warn:#fbbf24;--bad:#fb7185;--shadow:0 10px 40px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel);
    color:var(--txt);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--brand)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;color:#04121e}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
  .btn.lg{padding:14px 24px;font-size:15px}
  .btn.block{width:100%;justify-content:center}
  .muted{color:var(--muted)}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    color:var(--brand);background:rgba(82,227,164,.1);padding:5px 11px;border-radius:999px}
  /* ---------- top nav (marketing) ---------- */
  .nav{position:sticky;top:0;z-index:30;background:rgba(10,15,29,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .nav .inner{display:flex;align-items:center;gap:22px;height:64px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.2px}
  .brand .mark{width:32px;height:32px}
  .nav .links{display:flex;gap:22px;margin-left:14px}
  .nav .links a{color:var(--muted);font-size:14px;font-weight:500}
  .nav .links a:hover{color:var(--txt)}
  .nav .right{margin-left:auto;display:flex;gap:10px;align-items:center}
  .navtoggle{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer}
  /* ---------- hero ---------- */
  .hero{position:relative;overflow:hidden;padding:72px 0 64px;
    background:radial-gradient(900px 460px at 80% -10%,rgba(63,167,255,.16),transparent 60%),
               radial-gradient(700px 420px at 5% 0%,rgba(82,227,164,.12),transparent 55%)}
  .hero h1{font-size:50px;line-height:1.05;letter-spacing:-1px;max-width:13ch;margin:16px 0}
  .hero p.lead{font-size:19px;color:var(--muted);max-width:54ch;margin-bottom:26px}
  .hero .cta{display:flex;gap:12px;flex-wrap:wrap}
  .hero .stats{display:flex;gap:34px;margin-top:40px;flex-wrap:wrap}
  .hero .stats b{font-size:26px;display:block}
  .hero .stats span{font-size:13px;color:var(--muted)}
  .heroart{position:absolute;right:-40px;top:60px;width:480px;max-width:42vw;opacity:.95;display:none}
  @media(min-width:980px){.heroart{display:block}.hero{padding-bottom:90px}}
  /* ---------- sections ---------- */
  section.block{padding:62px 0;border-top:1px solid var(--line)}
  .h2{font-size:32px;letter-spacing:-.5px;margin-bottom:8px}
  .sub{color:var(--muted);max-width:60ch;margin-bottom:34px}
  .grid{display:grid;gap:18px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.g3,.g4,.g2{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:18px;padding:22px;box-shadow:var(--shadow)}
  .card .ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;
    background:rgba(82,227,164,.12);margin-bottom:14px}
  .card h3{font-size:17px;margin-bottom:6px}
  .card p{font-size:14px;color:var(--muted)}
  .steps{counter-reset:s}
  .step{display:flex;gap:16px;align-items:flex-start;padding:16px 0}
  .step .n{counter-increment:s;flex:0 0 auto;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
    font-weight:800;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04121e}
  .step .n:before{content:counter(s)}
  /* ---------- pricing ---------- */
  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:8px}
  .toggle button{border:none;background:none;color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
  .toggle button.on{background:rgba(82,227,164,.16);color:var(--txt)}
  .price{font-size:40px;font-weight:800;letter-spacing:-1px}
  .price small{font-size:14px;font-weight:500;color:var(--muted)}
  .plan{position:relative;display:flex;flex-direction:column}
  .plan.pop{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand),var(--shadow)}
  .plan .pill{position:absolute;top:-12px;left:22px;background:var(--brand);color:#04121e;font-size:11px;font-weight:800;
    padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .feat{list-style:none;margin:16px 0;display:flex;flex-direction:column;gap:9px}
  .feat li{font-size:13.5px;display:flex;gap:9px;color:var(--muted)}
  .feat li:before{content:"✓";color:var(--brand);font-weight:800}
  .feat li.no{color:#5b6582}
  .feat li.no:before{content:"—";color:#4a5572}
  /* ---------- products ---------- */
  .prod img,.prodimg{width:100%;height:150px;border-radius:12px;display:grid;place-items:center;font-size:46px;
    background:radial-gradient(120px 80px at 50% 30%,rgba(63,167,255,.2),transparent),var(--bg2);margin-bottom:14px}
  .prod .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .prod .p{font-size:20px;font-weight:800}
  /* ---------- checkout ---------- */
  .checkout{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:start}
  @media(max-width:860px){.checkout{grid-template-columns:1fr}}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
    padding:11px 12px;border-radius:11px;font-size:14px}
  .litem{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .litem .q{display:flex;gap:8px;align-items:center}
  .iconbtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--txt);cursor:pointer;font-size:14px;line-height:1}
  .total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;margin-top:14px}
  /* ---------- auth ---------- */
  .authwrap{min-height:72vh;display:grid;place-items:center;padding:40px 0}
  .authcard{width:100%;max-width:420px}
  .rolebtns{display:grid;gap:10px;margin-top:6px}
  .rolebtn{display:flex;gap:12px;align-items:center;text-align:left;padding:12px;border:1px solid var(--line);
    background:var(--bg2);border-radius:12px;cursor:pointer;color:var(--txt)}
  .rolebtn:hover{border-color:var(--brand)}
  .rolebtn .ri{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:0 0 auto}
  .rolebtn b{font-size:14px}.rolebtn span{font-size:12px;color:var(--muted)}
  /* ---------- app shell (RBAC) ---------- */
  .appshell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .side{background:var(--bg2);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .side .brand{margin:4px 8px 18px}
  .side nav{display:flex;flex-direction:column;gap:3px}
  .side nav a{display:flex;gap:11px;align-items:center;padding:10px 12px;border-radius:11px;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer}
  .side nav a:hover{background:rgba(255,255,255,.04);color:var(--txt)}
  .side nav a.on{background:rgba(82,227,164,.14);color:var(--txt)}
  .side .sep{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:16px 12px 6px;color:#65718f}
  .appmain{min-width:0;display:flex;flex-direction:column}
  .apptop{height:62px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;background:rgba(10,15,29,.85);backdrop-filter:blur(8px);z-index:5}
  .apptop .who{margin-left:auto;display:flex;align-items:center;gap:12px}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--accent));display:grid;place-items:center;font-weight:800;color:#04121e;font-size:13px}
  .rolebadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(167,139,250,.16);color:var(--accent)}
  .appbody{padding:24px 22px;max-width:1100px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.appshell{grid-template-columns:1fr}.side{position:fixed;z-index:40;left:-260px;transition:.2s;width:248px}.side.open{left:0}}
  .kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .l{font-size:12px;color:var(--muted)}
  .kpi .v{font-size:26px;font-weight:800;margin-top:4px}
  .kpi .d{font-size:12px;margin-top:4px}
  .up{color:var(--good)}.down{color:var(--bad)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .b-good{background:rgba(52,211,153,.15);color:var(--good)}
  .b-warn{background:rgba(251,191,36,.15);color:var(--warn)}
  .b-bad{background:rgba(251,113,133,.15);color:var(--bad)}
  .b-muted{background:rgba(154,166,196,.14);color:var(--muted)}
  .panelcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .panelcard h3{padding:14px 16px;font-size:15px;border-bottom:1px solid var(--line)}
  .denied{text-align:center;padding:60px 20px;color:var(--muted)}
  /* footer */
  footer{border-top:1px solid var(--line);padding:40px 0;color:var(--muted);font-size:13px}
  footer .cols{display:flex;gap:60px;flex-wrap:wrap;margin-bottom:24px}
  footer h4{color:var(--txt);font-size:13px;margin-bottom:10px}
  footer a{display:block;color:var(--muted);padding:3px 0}
  footer a:hover{color:var(--txt)}
  .cartdot{position:relative}
  .cartdot b{position:absolute;top:-6px;right:-8px;background:var(--brand);color:#04121e;font-size:10px;font-weight:800;border-radius:999px;padding:1px 5px}
  .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:var(--brand);color:#04121e;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13px;
    opacity:0;transition:.3s;z-index:60;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:760px){.nav .links{display:none}.navtoggle{display:block}.hero h1{font-size:36px}.h2{font-size:26px}}
  .compare{overflow:auto}
  .compare table{min-width:640px}
  .center{text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ====================================================================
   [Marca] — sitio SaaS (landing + tienda + checkout + login + plataforma RBAC)
   Marca placeholder: cambia BRAND en un solo lugar.
   ==================================================================== */
const BRAND = "[Marca]";
const DASHBOARD_URL = "../dashboard/index.html";  // la plataforma de monitoreo ya construida
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtCLP = n => "$"+Math.round(n).toLocaleString("es-CL");
const toast = m => {const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1900);};

function mark(size=32){return `<svg class="mark" width="${size}" height="${size}" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <path d="M14 30c4-1 6-5 6-10 0 6 3 9 7 9 3 0 5-2 6-5" stroke="#04121e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="34" cy="15" r="3.4" fill="#04121e"/>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#52e3a4"/><stop offset="1" stop-color="#3fa7ff"/></linearGradient></defs>
</svg>`;}

/* ---------- catálogo, planes, datos demo ---------- */
const PRODUCTS = [
  {id:"station", name:"Estación 4G LTE CAT1", emoji:"📡", price:189000, desc:"Nodo ESP32-S3 con módem 4G, batería LiPo y carcasa intemperie."},
  {id:"sensors", name:"Kit de sensores ambientales", emoji:"🌡️", price:64000, desc:"Temp/Humedad (AHT10), gases (SGP30) y luz (BH1750)."},
  {id:"solar",   name:"Panel solar + soporte", emoji:"🔆", price:42000, desc:"Autonomía energética para despliegue permanente en campo."},
  {id:"gateway", name:"Gateway de campo", emoji:"🛰️", price:120000, desc:"Concentra múltiples estaciones y reenvía por 4G."},
];
const PLANS = [
  {id:"starter", name:"Starter", m:0, y:0, tagline:"Para probar en un campo",
   feats:[["Hasta 2 estaciones",1],["Tiempo real y alarmas",1],["Históricos 7 días",1],["1 usuario",1],["Mapa de sensores",0],["Reportes PDF/Excel",0],["Roles y equipo",0],["Soporte prioritario",0]]},
  {id:"pro", name:"Pro", m:29000, y:290000, pop:true, tagline:"Para productores y fundos",
   feats:[["Hasta 15 estaciones",1],["Tiempo real y alarmas",1],["Históricos 1 año",1],["Hasta 10 usuarios",1],["Mapa de sensores",1],["Reportes PDF/Excel",1],["Roles y equipo",1],["Soporte prioritario",0]]},
  {id:"empresa", name:"Empresa", m:0, y:0, tagline:"Multi-campo y agroindustria", custom:true,
   feats:[["Estaciones ilimitadas",1],["Tiempo real y alarmas",1],["Históricos ilimitados",1],["Usuarios ilimitados",1],["Mapa de sensores",1],["Reportes + API",1],["Roles y jerarquía completa",1],["Soporte 24/7 + SLA",1]]},
];
const USECASES = [
  {emoji:"❄️",t:"Alerta de heladas",d:"Avisos tempranos por temperatura crítica para activar riego o calefactores."},
  {emoji:"💧",t:"Gestión de riego",d:"Humedad y clima para regar en el momento justo y ahorrar agua."},
  {emoji:"🌬️",t:"Clima y calidad del aire",d:"Temperatura, humedad, CO₂ y luz por parcela, en vivo e histórico."},
  {emoji:"📈",t:"Decisiones con datos",d:"Tendencias y reportes para optimizar rendimiento por temporada."},
];
const MODULES = [
  {emoji:"📈",t:"Tiempo real",d:"Lecturas de cada sensor al instante, con tarjetas y gráficas."},
  {emoji:"🗂️",t:"Históricos",d:"Series por rango con exportación a CSV, Excel y PDF."},
  {emoji:"🔔",t:"Alarmas",d:"Umbrales, cambios bruscos y caída de señal, con notificaciones."},
  {emoji:"🗺️",t:"Mapa de sensores",d:"Geolocaliza estaciones y entra a la ficha de cada una."},
  {emoji:"📋",t:"Reportes",d:"Informes por estación y periodo, listos para compartir."},
  {emoji:"🔌",t:"API e integraciones",d:"Conecta con ThingSpeak, MQTT o tu propio backend."},
];
const DEMO_USERS = {
  "super@demo.cl":{role:"superadmin", name:"Diego (Plataforma)", org:"[Marca]"},
  "admin@demo.cl":{role:"account_admin", name:"María (AgroDemo)", org:"AgroDemo SpA"},
  "campo@demo.cl":{role:"field_supervisor", name:"Pedro (Fundo Sur)", org:"AgroDemo SpA"},
};
const ROLES = {
  superadmin:{label:"Super Admin", ico:"🛡️", level:0, color:"var(--accent)"},
  account_admin:{label:"Admin de Cuenta", ico:"🏢", level:1, color:"var(--brand2)"},
  field_supervisor:{label:"Supervisor de Campo", ico:"🌾", level:2, color:"var(--brand)"},
};

/* ---------- estado (carrito, sesión, ciclo de pago) ---------- */
const store = {
  get cart(){try{return JSON.parse(localStorage.getItem("mk.cart"))||[]}catch(e){return[]}},
  set cart(v){localStorage.setItem("mk.cart",JSON.stringify(v));updateCartCount();},
  get session(){try{return JSON.parse(localStorage.getItem("mk.session"))}catch(e){return null}},
  set session(v){v?localStorage.setItem("mk.session",JSON.stringify(v)):localStorage.removeItem("mk.session");},
  billing:"y",
};
function addToCart(item){const c=store.cart;const ex=c.find(x=>x.id===item.id);if(ex)ex.qty++;else c.push({...item,qty:1});store.cart=c;toast("Añadido al carrito");}
function cartCount(){return store.cart.reduce((s,i)=>s+i.qty,0);}
function cartTotal(){return store.cart.reduce((s,i)=>s+i.price*i.qty,0);}
function updateCartCount(){document.querySelectorAll("[data-cartcount]").forEach(e=>{const n=cartCount();e.innerHTML=n?`<b>${n}</b>`:"";});}

/* ====================================================================
   Router
   ==================================================================== */
const routes={};
function go(hash){location.hash=hash;}
function router(){
  const raw=(location.hash.replace(/^#\/?/,"")||"").split("/");
  const path=raw[0]||"home";
  if(path==="app"){ return renderApp(raw.slice(1)); }
  const view=routes[path]||routes.home;
  document.getElementById("root").innerHTML = chromeTop() + view(raw.slice(1)) + chromeFoot();
  bindCommon();
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",router);
window.addEventListener("DOMContentLoaded",()=>{router();updateCartCount();});

/* ---------- chrome marketing ---------- */
function chromeTop(){
  return `<div class="nav"><div class="wrap inner">
    <a class="brand" href="#/home">${mark(32)} ${esc(BRAND)}</a>
    <div class="links">
      <a href="#/home">Producto</a>
      <a href="#/productos">Hardware</a>
      <a href="#/planes">Planes</a>
      <a href="#/home#como">Cómo funciona</a>
    </div>
    <div class="right">
      <a class="btn ghost sm cartdot" href="#/checkout" title="Carrito">🛒<span data-cartcount></span></a>
      <a class="btn ghost sm" href="#/login">Entrar</a>
      <a class="btn primary sm" href="#/planes">Empezar</a>
    </div>
  </div></div>`;
}
function chromeFoot(){
  return `<footer><div class="wrap">
    <div class="cols">
      <div style="flex:1;min-width:200px"><div class="brand" style="font-size:16px">${mark(26)} ${esc(BRAND)}</div>
        <p class="muted" style="margin-top:10px;max-width:30ch">Monitoreo agrícola inteligente: estaciones 4G, sensores y analítica de campo.</p></div>
      <div><h4>Producto</h4><a href="#/home">Características</a><a href="#/productos">Hardware</a><a href="#/planes">Planes</a><a href="${DASHBOARD_URL}" target="_blank">Demo en vivo</a></div>
      <div><h4>Plataforma</h4><a href="#/login">Iniciar sesión</a><a href="#/planes">Crear cuenta</a><a href="#/home#roles">Roles</a></div>
      <div><h4>Recursos</h4><a href="#/home">Soporte</a><a href="#/home">Documentación</a><a href="#/home">Estado del sistema</a></div>
    </div>
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;border-top:1px solid var(--line);padding-top:18px">
      <span>© ${"2026"} ${esc(BRAND)}. Marca y precios de demostración.</span>
      <span>Hecho con la plataforma de monitoreo · <a href="${DASHBOARD_URL}" target="_blank" style="display:inline;color:var(--brand)">abrir dashboard</a></span>
    </div>
  </div></footer>`;
}

/* ====================================================================
   Vistas marketing
   ==================================================================== */
routes.home=()=>`
  <header class="hero"><div class="wrap">
    <span class="tag">SaaS · AgTech</span>
    <h1>El campo, bajo control en tiempo real.</h1>
    <p class="lead">Estaciones 4G y sensores que miden clima, humedad y calidad del aire en cada parcela. Alarmas, históricos y mapas en una sola plataforma.</p>
    <div class="cta">
      <a class="btn primary lg" href="#/planes">Ver planes</a>
      <a class="btn ghost lg" href="${DASHBOARD_URL}" target="_blank">Probar la demo en vivo →</a>
    </div>
    <div class="stats">
      <div><b>4G LTE</b><span>conectividad sin WiFi</span></div>
      <div><b>−40…85 °C</b><span>operación a la intemperie</span></div>
      <div><b>6+ sensores</b><span>clima y calidad del aire</span></div>

function miniKpi(l,v,d){return `<div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px"><div style="font-size:10px;color:var(--muted)">${l}</div><div style="font-size:16px;font-weight:800">${v}</div></div>`;}
function miniChart(big){const w=big?320:300,h=big?150:90;const pts=[];for(let i=0;i<24;i++){pts.push(`${i/23*w},${h-12-(Math.sin(i/3)+1)/2*(h-30)-Math.random()*6}`);}return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><polyline fill="none" stroke="#52e3a4" stroke-width="2.5" points="${pts.join(" ")}"/><polyline fill="none" stroke="#3fa7ff" stroke-width="2" opacity=".7" points="${pts.map((p,i)=>{const[x,y]=p.split(",");return x+","+(+y+14)}).join(" ")}"/></svg>`;}

  updateCartCount();
  document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{const p=PRODUCTS.find(x=>x.id===b.dataset.add);addToCart({id:p.id,name:p.name,price:p.price});});
  document.querySelectorAll("[data-bill]").forEach(b=>b.onclick=()=>{store.billing=b.dataset.bill;router();});
  document.querySelectorAll("[data-plan]").forEach(b=>b.onclick=()=>{const p=PLANS.find(x=>x.id===b.dataset.plan);
    if(p.m===0&&p.y===0){store.session={...DEMO_USERS["admin@demo.cl"],email:"admin@demo.cl"};toast("Cuenta Starter creada (demo)");go("#/app");return;}
    addToCart({id:"plan_"+p.id,name:"Plan "+p.name+(store.billing==="y"?" (anual)":" (mensual)"),price:store.billing==="y"?p.y:p.m});go("#/checkout");});
  // checkout
  document.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{const c=store.cart;const i=c.find(x=>x.id===b.dataset.inc);i.qty++;store.cart=c;router();});
  document.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{const c=store.cart;const i=c.find(x=>x.id===b.dataset.dec);i.qty=Math.max(1,i.qty-1);store.cart=c;router();});
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{store.cart=store.cart.filter(x=>x.id!==b.dataset.del);router();});
  const pay=document.getElementById("payBtn");
  if(pay)pay.onclick=()=>{const total=fmtCLP(cartTotal()*1.19);store.cart=[];document.getElementById("root").innerHTML=chromeTop()+confirmView(total)+chromeFoot();bindCommon();window.scrollTo(0,0);};
  // login
  const lb=document.getElementById("loginBtn");
  if(lb)lb.onclick=()=>{const email=(document.getElementById("lg_email").value||"").trim().toLowerCase();
    const u=DEMO_USERS[email]||{role:"account_admin",name:email.split("@")[0]||"Usuario",org:"AgroDemo SpA"};
    store.session={...u,email};toast("Bienvenido/a");go("#/app");};
  document.querySelectorAll("[data-demo]").forEach(b=>b.onclick=()=>{const email=b.dataset.demo;store.session={...DEMO_USERS[email],email};go("#/app");});
  // nav móvil
  const tg=document.querySelector(".navtoggle");if(tg)tg.onclick=()=>document.querySelector(".nav .links").style.display="flex";
}
function confirmView(total){return `<section class="block"><div class="wrap center" style="padding:60px 0">
  <div style="font-size:54px">✅</div><h2 class="h2">¡Compra confirmada!</h2>
  <p class="sub" style="margin:6px auto 20px">Pago simulado por <b>${total}</b>. Te enviamos el acceso a la plataforma por correo (demo).</p>
  <a class="btn primary lg" href="#/login">Entrar a la plataforma</a> <a class="btn" href="#/home">Volver al inicio</a></div></section>`;}
function bindApp(sess){
  document.querySelectorAll("[data-nav]").forEach(a=>a.onclick=()=>go("#/app/"+a.dataset.nav));
  const lo=document.getElementById("logout");if(lo)lo.onclick=()=>{store.session=null;go("#/home");};
  const bg=document.getElementById("burger");if(bg)bg.onclick=()=>document.getElementById("side").classList.toggle("open");
  document.querySelectorAll("[data-invite]").forEach(b=>b.onclick=()=>toast("Invitación enviada (demo)"));
  document.querySelectorAll("[data-rep]").forEach(b=>b.onclick=()=>toast("Generando reporte (demo)…"));
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>toast("Ajustes guardados (demo)"));
}
</script>
</body>
</html>
