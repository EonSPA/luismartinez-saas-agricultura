<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Plataforma SaaS de monitoreo agrícola inteligente: estaciones celulares, sensores, alarmas y analítica de campo.">
<title>Sembu — Monitoreo agrícola inteligente</title>
<style>
  :root{
    --bg:#1a2c26;--bg2:#213730;--panel:#284139;--panel2:#304d44;--line:#446056;
    --txt:#f0f7f2;--muted:#bcd0c7;--brand:#4fe0a2;--brand2:#a3e635;--accent:#f59e0b;
    --sky:#38bdf8;--good:#22c55e;--warn:#fbbf24;--bad:#fb7185;--shadow:0 10px 40px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;overflow-x:hidden}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;min-height:100vh;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:2px solid var(--brand2);outline-offset:2px;border-radius:6px}
  .skip{position:absolute;left:-999px;top:8px;z-index:100;background:var(--brand);color:#04121e;
    padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px}
  .skip:focus{left:8px}
  .sr{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel);
    color:var(--txt);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--brand)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;color:#04121e}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
  .btn.lg{padding:14px 24px;font-size:15px}
  .btn.block{width:100%;justify-content:center}
  .muted{color:var(--muted)}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    color:var(--brand);background:rgba(61,220,132,.13);padding:5px 11px;border-radius:999px}
  /* ---------- top nav (marketing) ---------- */
  .nav{position:sticky;top:0;z-index:30;background:rgba(16,27,22,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .nav .inner{display:flex;align-items:center;gap:22px;height:64px;position:relative}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.2px}
  .brand .mark{width:32px;height:32px}
  .navmenu{display:flex;align-items:center;gap:22px;flex:1}
  .nav .links{display:flex;gap:22px;margin-left:14px}
  .nav .links a{color:var(--muted);font-size:14px;font-weight:500}
  .nav .links a:hover{color:var(--txt)}
  .nav .right{margin-left:auto;display:flex;gap:10px;align-items:center}
  .navtoggle{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer}
  /* ---------- hero ---------- */
  .hero{position:relative;overflow:hidden;padding:72px 0 64px;
    background:radial-gradient(900px 460px at 80% -10%,rgba(63,167,255,.16),transparent 60%),
               radial-gradient(700px 420px at 5% 0%,rgba(82,227,164,.12),transparent 55%)}
  .hero h1{font-size:50px;line-height:1.05;letter-spacing:-1px;max-width:13ch;margin:16px 0}
  .hero p.lead{font-size:19px;color:var(--muted);max-width:54ch;margin-bottom:26px}
  .hero .cta{display:flex;gap:12px;flex-wrap:wrap}
  .hero .stats{display:flex;gap:34px;margin-top:40px;flex-wrap:wrap}
  .hero .stats b{font-size:26px;display:block}
  .hero .stats span{font-size:13px;color:var(--muted)}
  .heroart{position:absolute;top:64px;right:max(22px,calc((100% - 1136px)/2));width:min(420px,38vw);opacity:.97;display:none}
  @media(min-width:1100px){.heroart{display:block}.hero{padding-bottom:90px}}
  /* ---------- sections ---------- */
  section.block{padding:62px 0;border-top:1px solid var(--line)}
  .h2{font-size:32px;letter-spacing:-.5px;margin-bottom:8px}
  .sub{color:var(--muted);max-width:60ch;margin-bottom:34px}
  .grid{display:grid;gap:18px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.g3,.g4,.g2{grid-template-columns:1fr}
    .iconbtn{min-width:40px;min-height:40px}.btn.sm{padding:10px 14px}.toggle button{padding:11px 16px}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:18px;padding:22px;box-shadow:var(--shadow)}
  .card .ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;
    background:rgba(61,220,132,.14);margin-bottom:14px}
  /* iconos con colores rotados (más vivos) */
  .grid .card:nth-child(4n+2) .ico{background:rgba(163,230,53,.16)}
  .grid .card:nth-child(4n+3) .ico{background:rgba(245,158,11,.18)}
  .grid .card:nth-child(4n+4) .ico{background:rgba(56,189,248,.16)}
  .card h3{font-size:17px;margin-bottom:6px}
  /* pruebas sociales */
  .logostrip{display:flex;flex-wrap:wrap;gap:14px 26px;align-items:center;margin:18px 0 26px;opacity:.92}
  .logoitem{font-weight:700;color:var(--muted);font-size:15px;letter-spacing:.2px}
  .quote{display:flex;flex-direction:column;gap:10px}
  .quote .qmark{font-size:26px}
  .quote blockquote{font-size:15px;line-height:1.5}
  .quote figcaption{color:var(--muted);font-size:13px;font-weight:600}
  .statband{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:26px;
    background:linear-gradient(120deg,rgba(61,220,132,.12),rgba(245,158,11,.10));border:1px solid var(--line);border-radius:18px;padding:22px}
  .statband b{font-size:30px;display:block;letter-spacing:-.5px}
  .statband span{font-size:13px;color:var(--muted)}
  @media(max-width:600px){.statband{grid-template-columns:repeat(2,1fr)}}
  .card p{font-size:14px;color:var(--muted)}
  .steps{counter-reset:s}
  .step{display:flex;gap:16px;align-items:flex-start;padding:16px 0}
  .step .n{counter-increment:s;flex:0 0 auto;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
    font-weight:800;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04121e}
  .step .n:before{content:counter(s)}
  /* ---------- pricing ---------- */
  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:8px}
  .toggle button{border:none;background:none;color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
  .toggle button.on{background:rgba(82,227,164,.16);color:var(--txt)}
  .price{font-size:40px;font-weight:800;letter-spacing:-1px}
  .price small{font-size:14px;font-weight:500;color:var(--muted)}
  .plan{position:relative;display:flex;flex-direction:column}
  .plan.pop{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand),var(--shadow)}
  .plan .pill{position:absolute;top:-12px;left:22px;background:var(--brand);color:#04121e;font-size:11px;font-weight:800;
    padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .feat{list-style:none;margin:16px 0;display:flex;flex-direction:column;gap:9px}
  .feat li{font-size:13.5px;display:flex;gap:9px;color:var(--muted)}
  .feat li:before{content:"✓";color:var(--brand);font-weight:800}
  .feat li.no{color:#5b6582}
  .feat li.no:before{content:"—";color:#4a5572}
  /* ---------- products ---------- */
  .prod img,.prodimg{width:100%;height:140px;border-radius:12px;display:grid;place-items:center;
    background:radial-gradient(130px 85px at 50% 35%,rgba(61,220,132,.16),transparent),var(--bg2);border:1px solid var(--line);margin-bottom:14px}
  .prod .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .prod .p{font-size:20px;font-weight:800}
  /* ---------- checkout ---------- */
  .checkout{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:start}
  @media(max-width:860px){.checkout{grid-template-columns:1fr}}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
    padding:11px 12px;border-radius:11px;font-size:14px}
  .litem{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .litem .q{display:flex;gap:8px;align-items:center}
  .iconbtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--txt);cursor:pointer;font-size:14px;line-height:1}
  .total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;margin-top:14px}
  /* ---------- auth ---------- */
  .authwrap{min-height:72vh;display:grid;place-items:center;padding:40px 0}
  .authcard{width:100%;max-width:420px}
  .rolebtns{display:grid;gap:10px;margin-top:6px}
  .rolebtn{display:flex;gap:12px;align-items:center;text-align:left;padding:12px;border:1px solid var(--line);
    background:var(--bg2);border-radius:12px;cursor:pointer;color:var(--txt)}
  .rolebtn:hover{border-color:var(--brand)}
  .rolebtn .ri{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:0 0 auto}
  .rolebtn b{font-size:14px}.rolebtn span{font-size:12px;color:var(--muted)}
  /* ---------- app shell (RBAC) ---------- */
  .appshell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .side{background:var(--bg2);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .side .brand{margin:4px 8px 18px}
  .side nav{display:flex;flex-direction:column;gap:3px}
  .side nav a{display:flex;gap:11px;align-items:center;padding:10px 12px;border-radius:11px;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer}
  .side nav a:hover{background:rgba(255,255,255,.04);color:var(--txt)}
  .side nav a.on{background:rgba(82,227,164,.14);color:var(--txt)}
  .side .sep{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:16px 12px 6px;color:#65718f}
  .appmain{min-width:0;display:flex;flex-direction:column}
  .apptop{height:62px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;background:rgba(16,27,22,.85);backdrop-filter:blur(8px);z-index:5}
  .apptop .who{margin-left:auto;display:flex;align-items:center;gap:12px}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--accent));display:grid;place-items:center;font-weight:800;color:#04121e;font-size:13px}
  .rolebadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(167,139,250,.16);color:var(--accent)}
  .appbody{padding:24px 22px;max-width:1100px}
  .appbody.wide{max-width:none;padding:0}
  .dashembed{height:calc(100vh - 62px)}
  .dashembed iframe{width:100%;height:100%;border:0;display:block;background:var(--bg)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .scrim{display:none}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.appshell{grid-template-columns:1fr}
    .side{position:fixed;z-index:40;left:-260px;transition:.2s;width:248px;top:0}.side.open{left:0}
    .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}}
  .kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .l{font-size:12px;color:var(--muted)}
  .kpi .v{font-size:26px;font-weight:800;margin-top:4px}
  .kpi .d{font-size:12px;margin-top:4px}
  .up{color:var(--good)}.down{color:var(--bad)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .b-good{background:rgba(52,211,153,.15);color:var(--good)}
  .b-warn{background:rgba(251,191,36,.15);color:var(--warn)}
  .b-bad{background:rgba(251,113,133,.15);color:var(--bad)}
  .b-muted{background:rgba(154,166,196,.14);color:var(--muted)}
  .panelcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .panelcard h3{padding:14px 16px;font-size:15px;border-bottom:1px solid var(--line)}
  .denied{text-align:center;padding:60px 20px;color:var(--muted)}
  /* footer */
  footer{border-top:1px solid var(--line);padding:40px 0;color:var(--muted);font-size:13px}
  footer .cols{display:flex;gap:60px;flex-wrap:wrap;margin-bottom:24px}
  footer h4{color:var(--txt);font-size:13px;margin-bottom:10px}
  footer a{display:block;color:var(--muted);padding:3px 0}
  footer a:hover{color:var(--txt)}
  .cartdot{position:relative}
  .cartdot b{position:absolute;top:-6px;right:-8px;background:var(--brand);color:#04121e;font-size:10px;font-weight:800;border-radius:999px;padding:1px 5px}
  .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:var(--brand);color:#04121e;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13px;
    opacity:0;transition:.3s;z-index:60;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:900px){
    .navtoggle{display:inline-flex}
    .navmenu{display:none;position:absolute;top:64px;left:0;right:0;flex-direction:column;align-items:stretch;
      gap:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:10px 14px;flex:none;box-shadow:var(--shadow)}
    .navmenu.open{display:flex}
    .navmenu .links{flex-direction:column;gap:0;margin:0}
    .navmenu .links a{padding:12px 4px;border-bottom:1px solid var(--line)}
    .navmenu .right{margin:12px 0 0;flex-wrap:wrap}
  }
  @media(max-width:760px){.hero h1{font-size:36px}.h2{font-size:26px}}
  .compare{overflow:auto}
  .compare table{min-width:640px}
  .center{text-align:center}
  /* ---------- rediseño editorial (menos "plantilla IA") ---------- */
  .eyebrow{display:flex;align-items:center;gap:11px;font-size:12.5px;font-weight:600;letter-spacing:.2px;color:var(--brand);margin-bottom:15px}
  .eyebrow::before{content:"";width:26px;height:1px;background:currentColor;opacity:.5}
  .ico-svg{width:1.3em;height:1.3em;display:block;flex:0 0 auto}
  .ic{display:inline-grid;place-items:center;width:38px;height:38px;border:1px solid var(--line);border-radius:11px;color:var(--brand);flex:0 0 auto}
  .ic svg{width:20px;height:20px}
  .prodimg svg{width:54px;height:54px;color:var(--brand)}
  .rolebtn .ri svg{width:18px;height:18px}
  .side nav a svg{width:18px;height:18px;flex:0 0 auto}
  .rolebadge svg{width:12px;height:12px}
  /* hero split */
  .hero2{display:grid;grid-template-columns:1.06fr .94fr;gap:52px;align-items:center}
  .hero-copy h1{max-width:15ch}
  .hero-copy .lead{max-width:48ch;margin-bottom:22px}
  .hero-link{display:inline-flex;align-items:center;gap:6px;color:var(--brand);font-weight:600;font-size:15px;padding:14px 8px}
  .hero-link:hover{text-decoration:underline}
  .hero-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:26px;color:var(--muted);font-size:13px}
  .hero-meta .dot{width:4px;height:4px;border-radius:50%;background:var(--line);flex:0 0 auto}
  .hero-panel{position:relative}
  @media(max-width:960px){.hero2{grid-template-columns:1fr;gap:34px}.hero-panel{max-width:440px}}
  /* lista de capacidades (editorial, no grilla de tarjetas) */
  .feat-list{display:grid;grid-template-columns:1fr 1fr;gap:0 48px;margin-top:6px}
  .feat-item{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;padding:22px 0;border-top:1px solid var(--line)}
  .feat-item h3{font-size:16px;margin-bottom:5px}
  .feat-item p{font-size:14px;color:var(--muted);line-height:1.55}
  @media(max-width:720px){.feat-list{grid-template-columns:1fr}}
  /* pasos limpios (sin círculos con degradado) */
  .steps2{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;margin-top:26px}
  .stepc{padding-top:16px;border-top:2px solid var(--brand)}
  .stepc .num{font-variant-numeric:tabular-nums;font-size:13px;font-weight:700;color:var(--brand);letter-spacing:.6px}
  .stepc h3{font-size:17px;margin:9px 0 6px}
  .stepc p{font-size:14px;color:var(--muted)}
  @media(max-width:720px){.steps2{grid-template-columns:1fr;gap:0}.stepc{border-top:1px solid var(--line);padding:20px 0}.stepc:first-child{border-top:2px solid var(--brand)}}
  /* split editorial asimétrico */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center}
  .split.narrow{grid-template-columns:1.08fr .92fr}
  @media(max-width:860px){.split,.split.narrow{grid-template-columns:1fr;gap:28px}}
  .pointlist{list-style:none;display:flex;flex-direction:column;gap:18px;margin-top:22px}
  .pointlist li{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start}
  .pointlist b{display:block;font-size:15px;margin-bottom:3px}
  .pointlist p{font-size:14px;color:var(--muted);margin:0;line-height:1.55}
  /* comparación pública vs marca */
  .vs-wrap{border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:6px}
  .vs{width:100%;border-collapse:collapse;font-size:14px}
  .vs th,.vs td{padding:15px 16px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
  .vs thead th{font-size:13px;font-weight:700;text-transform:none;letter-spacing:0;color:var(--txt)}
  .vs .rowh{color:var(--muted);font-weight:600;font-size:12.5px;width:24%;text-transform:none;letter-spacing:0}
  .vs .markcol{background:linear-gradient(180deg,rgba(61,220,132,.09),rgba(61,220,132,.03))}
  .vs thead th.markcol{color:var(--brand);font-weight:800}
  .vs tr:last-child td{border-bottom:none}
  .vs td b{color:var(--txt)}
  /* callout sin borde-izquierdo de color (evita el "tell" IA) */
  .callout{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:12.5px;color:var(--muted);margin-top:18px}
  /* mini-mapa de cuarteles (visual "de producto") */
  .blockmap{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:12px}
  .qtile{border:1px solid var(--line);border-radius:11px;padding:11px 11px 13px;background:var(--panel)}
  .qtile .qn{font-size:10.5px;color:var(--muted)}
  .qtile .qt{font-size:19px;font-weight:800;letter-spacing:-.5px;margin-top:1px}
  .maplegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:11px;font-size:11.5px;color:var(--muted)}
  .maplegend span{display:inline-flex;align-items:center;gap:6px}
  .maplegend i{width:9px;height:9px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
"use strict";
/* ====================================================================
   Sembu — sitio SaaS (landing + tienda + checkout + login + plataforma RBAC)
   Marca placeholder: cambia BRAND en un solo lugar.
   ==================================================================== */
const BRAND = "Sembu";
const DASHBOARD_URL = "../dashboard/index.html";  // la plataforma de monitoreo ya construida
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtCLP = n => "$"+Math.round(n).toLocaleString("es-CL");

/* ---------- estado (carrito, sesión, ciclo de pago) ----------
   Resistente a entornos donde localStorage está bloqueado (visor/iframe):
   cae a memoria para que la navegación nunca se rompa. */
const _mem={};
function lsGet(k){try{const v=localStorage.getItem(k);return v==null?(_mem[k]??null):v;}catch(e){return _mem[k]??null;}}
function lsSet(k,v){_mem[k]=v;try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){delete _mem[k];try{localStorage.removeItem(k);}catch(e){}}
const store = {
  get cart(){try{return JSON.parse(lsGet("mk.cart"))||[]}catch(e){return[]}},
  set cart(v){lsSet("mk.cart",JSON.stringify(v));updateCartCount();},
  get session(){try{return JSON.parse(lsGet("mk.session"))}catch(e){return null}},
  set session(v){v?lsSet("mk.session",JSON.stringify(v)):lsDel("mk.session");},
  billing:"y",
  _last:{},
};
function addToCart(item){const c=store.cart;const ex=c.find(x=>x.id===item.id);if(ex)ex.qty++;else c.push({...item,qty:1});store.cart=c;toast("Añadido al carrito");}
function cartCount(){return store.cart.reduce((s,i)=>s+i.qty,0);}
function cartTotal(){return store.cart.reduce((s,i)=>s+i.price*i.qty,0);}
function updateCartCount(){document.querySelectorAll("[data-cartcount]").forEach(e=>{const n=cartCount();e.innerHTML=n?`<b>${n}</b>`:"";});}

const routes={};
function go(hash){location.hash=hash;}
let lastPath=null;
function router(){
  try{document.documentElement.lang=lang;}catch(e){}
  const raw=(location.hash.replace(/^#\/?/,"")||"").split("/");
  const path=raw[0]||"home";
  if(path==="app"){ return renderApp(raw.slice(1)); }
  const view=routes[path]||routes.home;
  document.getElementById("root").innerHTML = chromeTop() + `<main id="main" tabindex="-1">` + view(raw.slice(1)) + `</main>` + chromeFoot();
  bindCommon();
  if(path!==lastPath){ window.scrollTo(0,0); const m=document.getElementById("main"); if(m)m.focus({preventScroll:true}); }
  lastPath=path;
}
window.addEventListener("hashchange",router);
window.addEventListener("DOMContentLoaded",()=>{router();updateCartCount();});

  const page=parts[0]||"monitoreo";

  const initial=esc(((sess.name||"?")[0]||"?"));
  const root=document.getElementById("root");
  root.innerHTML=`<div class="appshell">

/* ====================================================================
   Bindings
   ==================================================================== */
function bindCommon(){
  updateCartCount();
  document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{const p=PRODUCTS.find(x=>x.id===b.dataset.add);addToCart({id:p.id,name:p.name,price:p.price});});
  document.querySelectorAll("[data-quote]").forEach(b=>b.onclick=()=>{try{sessionStorage.setItem("mk.quote",b.dataset.quote);}catch(e){}});
  document.querySelectorAll("[data-bill]").forEach(b=>b.onclick=()=>{store.billing=b.dataset.bill;router();});
  document.querySelectorAll("[data-plan]").forEach(b=>b.onclick=()=>{const p=PLANS.find(x=>x.id===b.dataset.plan);
    if(p.m===0&&p.y===0){go("#/registro");return;}  // Starter: crear cuenta de verdad
    addToCart({id:"plan_"+p.id,name:"Plan "+p.name+(store.billing==="y"?" (anual)":" (mensual)"),price:store.billing==="y"?p.y:p.m});go("#/checkout");});
  // checkout
  document.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{const c=store.cart;const i=c.find(x=>x.id===b.dataset.inc);if(i){i.qty++;store.cart=c;router();}});
  document.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{const c=store.cart;const i=c.find(x=>x.id===b.dataset.dec);if(i){i.qty=Math.max(1,i.qty-1);store.cart=c;router();}});
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{store.cart=store.cart.filter(x=>x.id!==b.dataset.del);router();});
  const pay=document.getElementById("payBtn"),payForm=document.getElementById("checkoutForm");
  if(pay&&payForm)pay.onclick=()=>{
    if(!payForm.checkValidity()){payForm.reportValidity();return;}
    const total=fmtCLP(cartTotal()*1.19);store._last={total};store.cart=[];go("#/gracias");
  };
  // login
  const lb=document.getElementById("loginBtn");
  if(lb)lb.onclick=()=>{const email=(document.getElementById("lg_email").value||"").trim().toLowerCase();
    const u=DEMO_USERS[email]||{role:"account_admin",name:email.split("@")[0]||"Usuario",org:"AgroDemo SpA"};
    store.session={...u,email};toast("Bienvenido/a");go("#/app");};
  document.querySelectorAll("[data-demo]").forEach(b=>b.onclick=()=>{const email=b.dataset.demo;store.session={...DEMO_USERS[email],email};go("#/app");});
  // idioma
  document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>setLang(lang==="es"?"en":"es"));
  // registro (onboarding por pasos)
  const rf=document.getElementById("regForm");
  if(rf){let step=1;const show=n=>{rf.querySelectorAll(".regstep").forEach(s=>s.style.display=(+s.dataset.step===n)?"":"none");const rn=document.getElementById("regN");if(rn)rn.textContent=n;
      const f=rf.querySelector(`.regstep[data-step="${n}"] input,.regstep[data-step="${n}"] select`);if(f)f.focus();};
    rf.querySelectorAll("[data-next]").forEach(b=>b.onclick=()=>{
      const cur=rf.querySelector(`.regstep[data-step="${step}"]`);
      const inputs=[...cur.querySelectorAll("input,select")];
      const bad=inputs.find(i=>!i.checkValidity());
      if(bad){bad.reportValidity();return;}
      step=Math.min(3,step+1);show(step);});
    rf.onsubmit=e=>{e.preventDefault();const pid=(document.getElementById("regPlan")||{}).value||"starter";
      const u=DEMO_USERS["admin@demo.cl"];store.session={...u,email:"admin@demo.cl"};
      if(pid==="starter"){toast(t("create_account")+" ✓");go("#/app");}
      else{addToCart({id:"plan_"+pid,name:"Plan "+pid,price:PLANS.find(p=>p.id===pid).y});go("#/checkout");}};
  }
  // contacto (lead)
  const cf=document.getElementById("contactForm");
  if(cf)cf.onsubmit=e=>{e.preventDefault();if(!cf.checkValidity()){cf.reportValidity();return;}toast("Solicitud enviada ✓ Te contactaremos pronto");go("#/home");};
  // recuperar
  const rb=document.getElementById("resetBtn");
  if(rb)rb.onclick=()=>{const em=(document.getElementById("rc_email").value||"").trim();if(!em){toast("Ingresa tu email");return;}toast(t("send_link")+" ✓");go("#/login");};
  // nav móvil (menú hamburguesa)
  const tg=document.getElementById("navToggle"),menu=document.getElementById("navMenu");
  if(tg&&menu){
    tg.onclick=()=>{const open=menu.classList.toggle("open");tg.setAttribute("aria-expanded",open?"true":"false");};
    menu.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>{menu.classList.remove("open");tg.setAttribute("aria-expanded","false");}));
  }
}
function bindApp(sess){
  const lo=document.getElementById("logout");if(lo)lo.onclick=()=>{store.session=null;go("#/home");};
  const bg=document.getElementById("burger"),side=document.getElementById("side"),scrim=document.getElementById("scrim");
  const setSide=open=>{side.classList.toggle("open",open);if(scrim)scrim.classList.toggle("show",open);bg.setAttribute("aria-expanded",open?"true":"false");};
  if(bg&&side){
    bg.onclick=()=>setSide(!side.classList.contains("open"));
    if(scrim)scrim.onclick=()=>setSide(false);
    side.querySelectorAll("a[href^='#/app']").forEach(a=>a.addEventListener("click",()=>setSide(false)));
    document.addEventListener("keydown",e=>{if(e.key==="Escape")setSide(false);},{once:true});
  }
  document.querySelectorAll("[data-invite]").forEach(b=>b.onclick=()=>toast("Invitación enviada (demo)"));
  document.querySelectorAll("[data-rep]").forEach(b=>b.onclick=()=>toast("Generando reporte (demo)…"));
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>toast("Ajustes guardados (demo)"));
}
</script>
