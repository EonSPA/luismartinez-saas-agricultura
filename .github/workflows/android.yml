name: Build APK — wrapper legacy del dashboard Sembu

# Compila el APK de depuración de la app (Capacitor) y lo publica como artefacto.
on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "dashboard/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets into the native project
        run: |
          npm run sync-web
          npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sembu-dashboard-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Prepare APK with friendly name
        run: cp android/app/build/outputs/apk/debug/app-debug.apk sembu.apk

      - name: Publish APK to Release (descarga pública sin login)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Sembu — APK (wrapper del dashboard · build de prueba)
          prerelease: true
          fail_on_unmatched_files: true
          files: app/sembu.apk
          body: |
            APK de depuración del wrapper **Sembu** (dashboard) generado automáticamente.

            - Commit: `${{ github.sha }}`
            - Build: run #${{ github.run_number }}

            Descarga directa: **sembu.apk** (abajo en *Assets*).
            Instálalo en el teléfono (permite "orígenes desconocidos") o con `adb install sembu.apk`.
