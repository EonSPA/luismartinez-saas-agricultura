<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'">
<meta name="description" content="Estación agroclimática celular: alerta de helada, humedad de suelo, horas-frío, grados-día y ET₀ para fruta de exportación. Demostración con datos simulados.">
<meta name="theme-color" content="#101b16">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estación agro">
<title>Sembu — Estación agroclimática (demo)</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#1a2c26;--bg2:#213730;--panel:#284139;--panel2:#304d44;--line:#446056;
    --txt:#f0f7f2;--muted:#bcd0c7;--brand:#4fe0a2;--brand2:#a3e635;--accent:#f59e0b;
    --sky:#38bdf8;--soil:#c08457;--good:#22c55e;--warn:#fbbf24;--bad:#fb7185;--frost:#7dd3fc;
    --shadow:0 10px 40px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{overflow-x:hidden}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.45;-webkit-text-size-adjust:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}
  /* DEMO banner */
  .demobar{background:repeating-linear-gradient(45deg,rgba(245,158,11,.14),rgba(245,158,11,.14) 12px,rgba(245,158,11,.06) 12px,rgba(245,158,11,.06) 24px);
    border-bottom:1px solid var(--line);color:#ffe4b0;font-size:12.5px;font-weight:600;text-align:center;padding:6px 12px;position:sticky;top:0;z-index:30}
  .demobar b{color:#fff}
  /* header */
  header{background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:29px;z-index:20}
  .hd{display:flex;align-items:center;gap:12px;padding:12px 0;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px}
  .mark{width:30px;height:30px}
  .st{margin-left:2px}
  .st .n{font-weight:700;font-size:14px}
  .st .s{font-size:11.5px;color:var(--muted)}
  .chips{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:5px 10px}
  .chip b{color:var(--txt)}
  .cropsel{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:3px 6px 3px 11px}
  .cropsel select{background:var(--bg2);color:var(--txt);border:1px solid var(--line);border-radius:999px;padding:5px 9px;font:inherit;font-size:12px}
  /* tabs */
  .tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;background:none;border:none;color:var(--muted);font:inherit;font-size:13.5px;font-weight:600;padding:12px 14px;cursor:pointer;border-bottom:2px solid transparent}
  .tab.on{color:var(--brand);border-bottom-color:var(--brand)}
  main{padding:18px 0 60px}
  /* cards */
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:14px}
  .kpi .l{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
  .kpi .v{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .kpi .v small{font-size:13px;font-weight:600;color:var(--muted)}
  .kpi .d{font-size:11.5px;color:var(--muted);margin-top:2px}
  .sec-t{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin:24px 4px 10px}
  /* frost hero */
  .frost{border:1px solid var(--line);border-radius:18px;padding:18px 20px;position:relative;overflow:hidden;
    background:radial-gradient(700px 300px at 90% -20%,rgba(125,211,252,.16),transparent 60%),linear-gradient(180deg,var(--panel),var(--panel2))}
  .frost.red{border-color:rgba(251,113,133,.55);box-shadow:0 0 0 1px rgba(251,113,133,.25),0 10px 40px rgba(0,0,0,.5)}
  .frost .hrow{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
  .frost .big{font-size:56px;font-weight:800;letter-spacing:-2px;line-height:1}
  .frost .big small{font-size:22px;color:var(--muted);font-weight:700}
  .sem{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px}
  .sem.red{background:rgba(251,113,133,.16);color:#fecdd3;border:1px solid rgba(251,113,133,.5)}
  .sem.amber{background:rgba(245,158,11,.16);color:#ffe4b0;border:1px solid rgba(245,158,11,.5)}
  .sem.green{background:rgba(34,197,94,.14);color:#bbf7d0;border:1px solid rgba(34,197,94,.4)}
  .dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 10px currentColor}
  .frost .meta{display:flex;gap:26px;flex-wrap:wrap;margin-top:6px}
  .frost .meta .k{font-size:11.5px;color:var(--muted)}
  .frost .meta .val{font-size:19px;font-weight:800}
  .action{margin-top:14px;background:rgba(251,113,133,.10);border:1px solid rgba(251,113,133,.35);border-radius:12px;padding:11px 14px;font-size:13.5px}
  .action.amber{background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.35)}
  .action b{color:#fff}
  /* bars */
  .soilrow{display:flex;align-items:center;gap:12px;margin:9px 0}
  .soilrow .lab{width:120px;font-size:12.5px;color:var(--muted);flex:none}
  .soilrow .lab b{color:var(--txt);display:block;font-size:13px}
  .track{position:relative;flex:1;height:16px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .fill{position:absolute;top:0;left:0;bottom:0;border-radius:8px}
  .mk{position:absolute;top:-4px;bottom:-4px;width:2px}
  .soilrow .pct{width:52px;text-align:right;font-weight:800;font-size:14px;flex:none}
  .prog{position:relative;height:12px;background:var(--bg2);border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-top:8px}
  .prog>i{position:absolute;left:0;top:0;bottom:0;border-radius:7px;display:block}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
  /* recs */
  .rec{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .rec:first-child{border-top:none}
  .rec .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:17px;flex:none;background:rgba(61,220,132,.14)}
  .rec .ic.red{background:rgba(251,113,133,.16)}.rec .ic.amber{background:rgba(245,158,11,.16)}.rec .ic.sky{background:rgba(56,189,248,.14)}
  .rec h4{font-size:14px;margin-bottom:2px}
  .rec p{font-size:12.5px;color:var(--muted)}
  .pri{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:6px;margin-left:auto;flex:none}
  .pri.alta{background:rgba(251,113,133,.18);color:#fecdd3}.pri.media{background:rgba(245,158,11,.18);color:#ffe4b0}.pri.baja{background:rgba(34,197,94,.14);color:#bbf7d0}
  /* misc */
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  h3.ct{font-size:15px;margin-bottom:2px}
  .sub{font-size:12px;color:var(--muted);margin-bottom:10px}
  .collapse{border:1px dashed var(--line);border-radius:14px;overflow:hidden}
  .collapse>summary{list-style:none;cursor:pointer;padding:14px;display:flex;align-items:center;gap:10px;font-weight:700}
  .collapse>summary::-webkit-details-marker{display:none}
  .collapse>summary .tagm{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 9px;text-transform:uppercase;letter-spacing:.4px}
  .collapse .inner{padding:0 14px 14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .b-good{background:rgba(34,197,94,.14);color:#bbf7d0}.b-warn{background:rgba(245,158,11,.16);color:#ffe4b0}.b-bad{background:rgba(251,113,133,.16);color:#fecdd3}.b-muted{background:var(--panel);color:var(--muted)}
  .quarter{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--panel)}
  .quarter.risk{border-color:rgba(251,113,133,.5)}
  /* ---- mapa de dispositivos (Leaflet + OSM/CARTO) ---- */
  .cmap{height:380px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--bg2);z-index:0}
  .cmap.nomap{display:grid;place-items:center;padding:24px}
  .mapfallback{color:var(--muted);font-size:13px;text-align:center;max-width:46ch;line-height:1.5}
  .maplegend2{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:10px;font-size:12px;color:var(--muted)}
  .maplegend2 i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-1px}
  .leaflet-container{background:var(--bg2);font:inherit}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panel);color:var(--txt);box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .leaflet-popup-content{font-size:12.5px;line-height:1.55;margin:11px 13px}
  .leaflet-container a.leaflet-popup-close-button{color:var(--muted)}
  .leaflet-tooltip{background:var(--panel);color:var(--txt);border:1px solid var(--line);font-size:12px}
  .leaflet-tooltip-top:before{border-top-color:var(--line)}
  .leaflet-bar a{background:var(--panel);color:var(--txt);border-color:var(--line)}
  .leaflet-bar a:hover{background:var(--panel2)}
  .leaflet-control-attribution{background:rgba(10,20,13,.72)!important;color:var(--muted)!important;font-size:10px}
  .leaflet-control-attribution a{color:var(--muted)!important}
  @media(max-width:560px){.cmap{height:300px}}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);color:var(--txt);border-radius:10px;padding:9px 13px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;color:#04121e}
  .note{font-size:11.5px;color:var(--muted);border-left:3px solid var(--line);padding:4px 0 4px 11px;margin-top:10px}
  @media(max-width:900px){.g6,.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}.frost .big{font-size:46px}}
  @media(max-width:560px){.g2,.g3{grid-template-columns:1fr}.chips{width:100%;margin-left:0}.soilrow .lab{width:96px}}
</style>
</head>
<body>
<div class="demobar" id="demobar">🧪 <b>DEMO — datos simulados</b> · escenario ilustrativo: cerezos en Curicó, madrugada con helada · no son lecturas reales de un cliente</div>
<header>
  <div class="wrap hd">
    <span class="brand">
      <svg class="mark" viewBox="0 0 48 48"><rect width="48" height="48" rx="12" fill="url(#g)"/>
        <g fill="none" stroke="#04121e" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"><path d="M32 17 C 29 13 19 13 17 18 C 15 23 22 24.5 25 26 C 29 27.5 33 30 31 35 C 28.5 39.5 20 39 16.5 35.5"/></g><path d="M32 17 C 35 15 38 16 39 13 C 36 11 32.5 13 32 17 Z" fill="#04121e"/>
        
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3ddc84"/><stop offset="1" stop-color="#a3e635"/></linearGradient></defs></svg>
      Sembu
    </span>
    <span class="st"><span class="n" id="stName">Fundo demo · Curicó, Maule</span><span class="s" id="stSub">Estación agroclimática · ESP32-S3 + LTE-M / NB-IoT</span></span>
    <span class="chips">
      <span class="cropsel">Equipo
        <select id="hw" aria-label="Modelo de equipo">
          <option value="full">Modelo A · Estación completa</option>
          <option value="node">Modelo B · Nodo a batería</option>
        </select>
      </span>
      <span class="cropsel">Cultivo
        <select id="crop" aria-label="Cultivo">
          <option value="cerezo">🍒 Cerezo</option>
          <option value="palto">🥑 Palto</option>
          <option value="kiwi">🥝 Kiwi</option>
          <option value="arandano">🫐 Arándano</option>
          <option value="uva">🍇 Uva de mesa</option>
          <option value="nogal">🌰 Nogal</option>
          <option value="ciruelo">🟣 Ciruelo</option>
        </select>
      </span>
      <span class="chip" id="clock">🕔 05:20</span>
      <span class="chip">📶 <b>LTE-M</b> · CSQ 21</span>
      <span class="chip" id="powChip">🔋 <b>82%</b> · solar</span>
    </span>
  </div>
  <div class="wrap"><div class="tabs" id="tabs">
    <button class="tab on" data-tab="vivo">Tiempo real</button>
    <button class="tab" data-tab="hist">Históricos</button>
    <button class="tab" data-tab="cuarteles">Mapa</button>
    <button class="tab" data-tab="alarmas">Alarmas</button>
    <button class="tab" data-tab="config">Configuración</button>
  </div></div>
</header>
<main><div class="wrap" id="view"></div></main>

<script src="vendor/leaflet.js"></script>
<script>
"use strict";
/* ================= Escenario base coherente (una sola historia de campo) =================
   Cerezos, Curicó (Maule), ~8 de septiembre, madrugada. Helada radiativa en curso:
   cielo despejado + viento calmo + aire seco (punto de rocío bajo) → fuerte enfriamiento.
   El frío invernal ya está cumplido → las yemas están en brotación y por eso quedan
   vulnerables a la helada. Suelo con humedad adecuada (no es noche de riego, es de helada). */
const SCN = {
  place:"Fundo demo · Curicó, Maule", crop:"cerezo",
  // curva de temperatura del aire de la noche (min desde 18:00) → °C
  nightCurve:[[0,9.0],[60,6.8],[120,4.6],[180,3.0],[240,1.9],[300,1.0],[360,0.4],[420,-0.2],
    [480,-0.8],[540,-1.3],[600,-1.7],[640,-2.1],[680,-2.5],[700,-2.3],[720,-1.4],[780,0.6],[840,3.2],[900,7.0]],
  minTemp:-2.5, minAtMin:680,           // mínima estimada 05:20 + ... = 06:40 (18:00 + 680 min)
  startMin:560,                          // "ahora" = 18:00 + 560 = 03:20 (helada activa) ... avanza en vivo
  hr:78, dew:-3.4, wind:1.6, windDir:"SE", windDeg:135, radiation:0, radPeak:520,
  rainDay:0, rainSeason:318, leafWet:0,
  soil:[ {d:"15 cm", t:8.1, m:22}, {d:"30 cm", t:9.8, m:28}, {d:"60 cm", t:11.6, m:31} ],
  soilFC:32, soilPMP:12,                 // capacidad de campo / punto marchitez (suelo franco)
  chillHF:1148, chillPor:71,             // Horas Frío <7,2°C y Porciones de Frío (Dynamic)
  gdd:52,                                // grados-día acumulados temporada (desde 1-ago)
  et0:1.9, kc:0.45, caTemp:0.4, caCO2:1180, caHR:92
};
/* Formato chileno: coma decimal para valores de display (no para coordenadas SVG). */
const dec = v => (''+v).replace('.', ',');
/* Requerimientos y modelos por cultivo (metas de frío, base GDD, plaga por grados-día, umbral de daño por helada) */
const CROPS = {
  cerezo:  {emoji:"🍒", name:"Cerezo",       chillHF:1100, chillPor:65, gddBase:10, pest:"Drosophila suzukii", frostCrit:-1.1, stage:"Brotación / inicio floración"},
  palto:   {emoji:"🥑", name:"Palto",        chillHF:0,    chillPor:0,  gddBase:10, pest:"Conchuela / trips",   frostCrit:-1.0, stage:"Floración (muy sensible)"},
  kiwi:    {emoji:"🥝", name:"Kiwi",         chillHF:800,  chillPor:60, gddBase:10, pest:"—",                  frostCrit:-1.5, stage:"Brotación"},
  arandano:{emoji:"🫐", name:"Arándano",     chillHF:600,  chillPor:45, gddBase:7,  pest:"Drosophila suzukii", frostCrit:-1.5, stage:"Brotación / flor"},
  uva:     {emoji:"🍇", name:"Uva de mesa",  chillHF:300,  chillPor:30, gddBase:10, pest:"Lobesia botrana",    frostCrit:-0.5, stage:"Pre-brotación"},
  nogal:   {emoji:"🌰", name:"Nogal",        chillHF:700,  chillPor:55, gddBase:10, pest:"Carpocapsa (Cydia pomonella)", frostCrit:-1.5, stage:"Yema hinchada"},
  ciruelo: {emoji:"🟣", name:"Ciruelo",      chillHF:800,  chillPor:58, gddBase:10, pest:"Carpocapsa / grafolita", frostCrit:-1.3, stage:"Botón / floración"}
};
let CROP = "cerezo";
/* ---- perfiles de hardware: el dashboard muestra solo los módulos que el equipo alimenta ---- */
const HW = {
  full:{ label:"Estación completa", node:"ESP32-S3 + LTE-M / NB-IoT",
    energy:"LiPo + panel solar (autonomía a validar en piloto)",
    sensors:"Suelo 15/30/60 cm · aire T/HR · pluviómetro · anemómetro · piranómetro · mojado foliar",
    has:{wind:true,rain:true,rad:true,leafwet:true,et0:true} },
  node:{ label:"Nodo rugerizado (batería)", node:"STM32 + LTE-M / NB-IoT · NORVI IP67",
    energy:"Batería litio no recargable · 5–7 años (sin panel solar)",
    sensors:"Suelo 15/30/60 cm (RS-485) · aire T/HR",
    has:{wind:false,rain:false,rad:false,leafwet:false,et0:false} },
};
let HWSEL = "full";
const hw = () => HW[HWSEL];
let tmin = SCN.startMin;            // reloj del escenario (min desde 18:00), avanza "en vivo"
let timer = null;

/* ================= Campos y dispositivos (coordenadas DEMO cerca de Curicó) =================
   Cada campo tiene su centro y sus cuarteles con lat/lng y estado de helada.
   Al instalar hardware real, se reemplazan estas coordenadas por el GPS de cada estación. */
const CAMPOS = {
  fundo_sur:{ name:"Fundo Sur · Curicó, Maule", center:[-34.9885,-71.2322], zoom:15, cuarteles:[
    {n:"Cuartel 1 · Cerezo Santina", crop:"Cerezo Santina", ha:6, temp:-2.5, st:"risk", dev:"AME-01", lat:-34.9865, lng:-71.2345},
    {n:"Cuartel 2 · Cerezo Lapins",  crop:"Cerezo Lapins",  ha:5, temp:-1.9, st:"risk", dev:"AME-02", lat:-34.9892, lng:-71.2358},
    {n:"Cuartel 3 · Cerezo Regina",  crop:"Cerezo Regina",  ha:4, temp:-0.8, st:"warn", dev:"AME-03", lat:-34.9905, lng:-71.2318},
    {n:"Cuartel 4 · Palto Hass",     crop:"Palto Hass",     ha:8, temp:-1.2, st:"risk", dev:"AME-04", lat:-34.9878, lng:-71.2295},
    {n:"Cuartel 5 · Ciruelo",        crop:"Ciruelo D'Agen", ha:3, temp:0.6,  st:"good", dev:"AME-05", lat:-34.9858, lng:-71.2302},
    {n:"Cuartel 6 · Uva de mesa",    crop:"Uva de mesa",    ha:7, temp:1.4,  st:"good", dev:"AME-06", lat:-34.9912, lng:-71.2340},
  ]},
  fundo_norte:{ name:"Fundo Norte · Molina, Maule", center:[-34.9588,-71.2048], zoom:15, cuarteles:[
    {n:"Cuartel N1 · Arándano Duke", crop:"Arándano Duke",   ha:5, temp:2.1,  st:"good", dev:"AME-07", lat:-34.9575, lng:-71.2065},
    {n:"Cuartel N2 · Kiwi Hayward",  crop:"Kiwi Hayward",    ha:6, temp:0.4,  st:"warn", dev:"AME-08", lat:-34.9598, lng:-71.2038},
    {n:"Cuartel N3 · Nogal Chandler",crop:"Nogal Chandler",  ha:9, temp:1.8,  st:"good", dev:"AME-09", lat:-34.9572, lng:-71.2022},
    {n:"Cuartel N4 · Cerezo Kordia", crop:"Cerezo Kordia",   ha:4, temp:-0.3, st:"warn", dev:"AME-10", lat:-34.9603, lng:-71.2071},
  ]},
  parcela_rio:{ name:"Parcela Río · Sagrada Familia", center:[-35.0122,-71.2600], zoom:15, cuarteles:[
    {n:"Cuartel R1 · Uva Thompson",  crop:"Uva Thompson",   ha:7, temp:3.2, st:"good", dev:"AME-11", lat:-35.0110, lng:-71.2615},

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function minToClock(m){ const tot=(18*60+m)%1440; const h=Math.floor(tot/60), mm=tot%60; return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0"); }
function lerpCurve(curve,m){ // interpola °C en la curva nocturna
  if(m<=curve[0][0])return curve[0][1];
  for(let i=1;i<curve.length;i++){ if(m<=curve[i][0]){ const [x0,y0]=curve[i-1],[x1,y1]=curve[i]; const f=(m-x0)/(x1-x0); return y0+(y1-y0)*f; } }
  return curve[curve.length-1][1];
}
const tempNow=()=>lerpCurve(SCN.nightCurve,tmin);
const minsToMin=()=>Math.max(0,SCN.minAtMin-tmin);

/* semáforo de helada según cultivo */
function frostLevel(t){ const c=CROPS[CROP]; if(t<=c.frostCrit) return "red"; if(t<=c.frostCrit+2) return "amber"; return "green"; }
function frostLabel(l){ return l==="red"?"HELADA — riesgo de daño":l==="amber"?"Alerta — temperatura crítica cerca":"Sin riesgo de helada"; }
function frostColor(l){ return l==="red"?"var(--bad)":l==="amber"?"var(--warn)":"var(--good)"; }

          <div><div class="k">Umbral de daño (${esc(c.name)})</div><div class="val">${dec(c.frostCrit.toFixed(1))} °C</div></div>
          ${hw().has.wind

        <line x1="0" y1="${critY}" x2="${W}" y2="${critY}" stroke="rgba(251,113,133,.6)" stroke-dasharray="4 4" stroke-width="1"/>

    <div class="action ${lvl==='amber'?'amber':''}">

        : lvl==='amber'

function kpiRow(){

  const g=cards.length>=6?"g6":cards.length===3?"g3":"g4";
  return `<div class="grid ${g}">${cards.map(c=>`<div class="card kpi"><div class="l">${c[0]} ${c[1]}</div><div class="v">${c[2]}</div><div class="d">${c[3]}</div></div>`).join("")}</div>`;
}
function soilCard(){
  const fc=SCN.soilFC,pmp=SCN.soilPMP;

    const avail=clamp((s.m-pmp)/(fc-pmp)*100,0,100);

        <div class="fill" style="width:${wp(s.m)}%;background:linear-gradient(90deg,#7a5636,var(--soil))"></div>

  </div>`;
}
function chillCard(){

function et0Card(){

function windRain(){
  // rosa de vientos (frecuencia por sector) — noche calma dominante SE/S
  const dirs=[["N",348,10],["NE",30,6],["E",65,8],["SE",135,26],["S",190,22],["SO",225,12],["O",270,8],["NO",315,8]];
  const cx=90,cy=90,R=72; const max=26;
  const petals=dirs.map(([lab,deg,fr])=>{
    const a=(deg-90)*Math.PI/180, len=18+ (fr/max)*(R-18);
    const x=cx+Math.cos(a)*len, y=cy+Math.sin(a)*len;
    const x2=cx+Math.cos(a)*18, y2=cy+Math.sin(a)*18;
    const col=fr>=22?"var(--sky)":fr>=12?"#5eb0d6":"#3a6b82";
    return `<line x1="${x2.toFixed(1)}" y1="${y2.toFixed(1)}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="${col}" stroke-width="10" stroke-linecap="round"/>
      <text x="${(cx+Math.cos(a)*(R+9)).toFixed(1)}" y="${(cy+Math.sin(a)*(R+9)+3).toFixed(1)}" fill="var(--muted)" font-size="10" text-anchor="middle">${lab}</text>`;
  }).join("");
  return `<div class="card">
    <h3 class="ct">🌬️ Viento y lluvia</h3>
    <div class="sub">Viento calmo del ${SCN.windDir} → condición típica de helada radiativa</div>

        <circle cx="90" cy="90" r="72" fill="none" stroke="var(--line)"/><circle cx="90" cy="90" r="45" fill="none" stroke="var(--line)"/>
        ${petals}
        <circle cx="90" cy="90" r="4" fill="var(--muted)"/>
      </svg>
      <div style="flex:1;min-width:150px">
        <div class="kpi" style="margin-bottom:12px"><div class="l">Velocidad actual</div><div class="v">${dec(SCN.wind)}<small> km/h</small> <span class="muted" style="font-size:14px">${SCN.windDir}</span></div></div>
        <div class="kpi" style="margin-bottom:12px"><div class="l">Lluvia acumulada — hoy</div><div class="v">${SCN.rainDay}<small> mm</small></div></div>
        <div class="kpi"><div class="l">Lluvia — temporada</div><div class="v">${SCN.rainSeason}<small> mm</small></div></div>
      </div>
    </div>
  </div>`;
}
function recsCard(){

  else if(lvl==="amber") recs.push(["❄️","amber","media","Prepara el control de helada",`Temperatura acercándose a ${c.frostCrit} °C. Ten listos aspersión/calefactores.`]);
  recs.push(["💧","sky","baja","Riego en pausa",`Humedad de suelo adecuada en profundidad. Reponer recién cuando el estrato de 15 cm baje del 50% de agua aprovechable.`]);
  if(SCN.chillHF>=c.chillHF) recs.push(["🌸","amber","media","Yemas vulnerables",`Frío invernal cumplido: brotación en curso, extrema la vigilancia de heladas los próximos días.`]);
  recs.push(["🐛","baja"==="baja"?"":"","baja","Plaga bajo control",`${c.pest==="—"?"Sin modelo de plaga por grados-día.":`Actividad de <b>${esc(c.pest)}</b> baja por el frío; reactivar monitoreo al subir la temperatura.`}`]);
  return `<div class="card">

}

  <div class="row" style="gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <span class="cropsel">Campo <select id="campoSel" aria-label="Campo">${opts}</select></span>
    <span class="chip">📍 <b>${campo.cuarteles.length}</b> dispositivos</span>
    <span class="chip">🟥 ${n.risk} · 🟧 ${n.warn} · 🟩 ${n.good}</span>
  </div>
  <div id="cmap" class="cmap" aria-label="Mapa de dispositivos del campo (demo)"></div>
  <div class="maplegend2"><span><i style="background:#fb7185"></i>Helada crítica</span><span><i style="background:#fbbf24"></i>Alerta</span><span><i style="background:#22c55e"></i>Normal</span><span style="margin-left:auto">Toca un punto para ver el detalle</span></div>
  <div class="grid g3" style="margin-top:14px">${list}</div>
  <div class="note">🗺️ Mapa interactivo con <b>OpenStreetMap</b> (Leaflet, sin clave de API). Las coordenadas son <b>de demostración</b> cerca de Curicó; se reemplazan por el <b>GPS real</b> de cada estación al instalarla.</div>`;
}
function destroyCMap(){ if(CMAP){ try{CMAP.remove();}catch(e){} CMAP=null; } }
function initCuartelesMap(){
  const sel=$("campoSel");
  if(sel) sel.addEventListener("change",e=>{ CAMPO=e.target.value; render(); });
  const el=$("cmap"); if(!el) return;
  if(!window.L){ el.classList.add("nomap"); el.innerHTML='<div class="mapfallback">🗺️ El mapa interactivo no pudo cargar la librería. La lista de cuarteles de abajo muestra el estado de cada dispositivo.</div>'; return; }
  const campo=CAMPOS[CAMPO];
  CMAP=L.map(el,{scrollWheelZoom:false}).setView(campo.center,campo.zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:'&copy; OpenStreetMap · &copy; CARTO'}).addTo(CMAP);
  const col={risk:'#fb7185',warn:'#fbbf24',good:'#22c55e'};
  const pts=[];
  campo.cuarteles.forEach(q=>{
    pts.push([q.lat,q.lng]);
    L.circleMarker([q.lat,q.lng],{radius:11,weight:2,color:'#0a140d',fillColor:col[q.st],fillOpacity:.95})
      .addTo(CMAP)
      .bindTooltip(esc(q.n),{direction:'top',offset:[0,-6]})
      .bindPopup(`<b>${esc(q.n)}</b><br>${esc(q.crop)} · ${q.ha} ha<br>Mín. estimada: <b style="color:${col[q.st]}">${dec(q.temp.toFixed(1))} °C</b><br>Dispositivo <b>${esc(q.dev)}</b> · ● en línea<br><span style="opacity:.65">Demo · coordenadas simuladas</span>`);
  });
  if(pts.length) CMAP.fitBounds(pts,{padding:[38,38],maxZoom:16});
  setTimeout(()=>{ try{ CMAP&&CMAP.invalidateSize(); }catch(e){} },80);
}
function viewAlarmas(){
  const rows=[
    ["Hoy 04:55","Cuartel 1","Helada","−2,1 °C","Activa","bad"],
    ["Hoy 04:10","Cuartel 4 (Palto)","Helada","−1,2 °C","Activa","bad"],
    ["Hoy 03:20","Estación","Temp. bajo umbral","0,0 °C","Notificada","warn"],
    ["Ayer 19:40","Cuartel 3","Descenso brusco","−3 °C/h","Atendida","good"],
  ];
  return `<h3 class="ct">Alarmas</h3><div class="sub">Umbral alto/bajo, descenso brusco, helada y caída de señal — con aviso visual, sonoro y push.</div>
  <div class="card"><table><thead><tr><th>Hora</th><th>Origen</th><th>Tipo</th><th>Valor</th><th>Estado</th></tr></thead>
  <tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><span class="badge b-${r[5]}">${r[4]}</span></td></tr>`).join("")}</tbody></table></div>
  <div class="note">Las alarmas de helada se disparan de forma <b>anticipada</b> según la proyección de la mínima, no solo al cruzar el umbral.</div>`;
}
function viewConfig(){
  const c=CROPS[CROP];
  return `<h3 class="ct">Configuración de la estación</h3><div class="sub">Parámetros del nodo agroclimático y del cultivo (demo).</div>
  <div class="grid g2">
    <div class="card"><h4 style="margin-bottom:8px">Estación</h4>
      <table><tbody>
      <tr><td class="muted">Modelo</td><td>${esc(hw().label)}</td></tr>
      <tr><td class="muted">Nodo</td><td>${esc(hw().node)}</td></tr>
      <tr><td class="muted">Energía</td><td>${esc(hw().energy)}</td></tr>
      <tr><td class="muted">Conectividad</td><td>Celular LTE-M/NB-IoT con buffer local si cae la señal</td></tr>
      <tr><td class="muted">Sensores</td><td>${esc(hw().sensors)}</td></tr>
      </tbody></table>
    </div>
    <div class="card"><h4 style="margin-bottom:8px">Cultivo · ${esc(c.name)}</h4>
      <table><tbody>
      <tr><td class="muted">Estado fenológico</td><td>${esc(c.stage)}</td></tr>
      <tr><td class="muted">Umbral de daño por helada</td><td>${c.frostCrit} °C</td></tr>
      <tr><td class="muted">Meta de frío</td><td>${c.chillHF?c.chillHF+" h · "+c.chillPor+" porciones":"cultivo de bajo requerimiento"}</td></tr>
      <tr><td class="muted">Grados-día base</td><td>${c.gddBase} °C</td></tr>
      <tr><td class="muted">Plaga objetivo</td><td>${esc(c.pest)}</td></tr>
      </tbody></table>
    </div>
  </div>
  <div class="note">🧪 Umbrales editables por cultivo y estado fenológico en la versión desplegada. Datos de esta pantalla: <b>simulados (demo)</b>.</div>`;
}
const VIEWS={vivo:viewVivo,hist:viewHist,cuarteles:viewCuarteles,alarmas:viewAlarmas,config:viewConfig};
let TAB="vivo";
function render(){ destroyCMap(); $("view").innerHTML=VIEWS[TAB](); if(TAB==="cuarteles") initCuartelesMap(); }

/* ---- eventos ---- */
$("tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;
  TAB=b.dataset.tab; [...$("tabs").children].forEach(x=>x.classList.toggle("on",x===b)); render();
  window.scrollTo({top:0,behavior:"smooth"});});
$("crop").addEventListener("change",e=>{CROP=e.target.value; render();});
$("hw").addEventListener("change",e=>{ HWSEL=e.target.value; syncHw(); render(); });
function syncHw(){
  $("stSub").textContent = "Estación agroclimática · "+hw().node;
  const pc=$("powChip"); if(pc) pc.innerHTML = HWSEL==="node" ? "🔋 <b>batería</b> · 5–7 años" : "🔋 <b>82%</b> · solar";
}

/* ---- "vivo": avanza el reloj del escenario y actualiza ---- */
function tick(){
  tmin=Math.min(700, tmin+6);   // avanza ~6 min de escenario por tick hasta pasada la mínima
  $("clock").textContent="🕔 "+minToClock(tmin);
  if(TAB==="vivo") render();
}
render();
$("clock").textContent="🕔 "+minToClock(tmin);
timer=setInterval(tick,3500);

/* ---- PWA ---- */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
